    <section class="card-light-container ">

        <div id="card-main-wraper" >

            <div class="card-box" style="height: 100vh; width: 120vw;">
                <div class="card-content-box">
                </div>
            </div>


        </div>
    </section>

    <script src="./node_modules/jquery/dist/jquery.min.js"></script>
    <script src="./js/index.js"></script>
    <script>
        document.getElementById("card-main-wraper").onmousemove = e => {
            for (const card of document.getElementsByClassName("card-box")) {
                const rect = card.getBoundingClientRect(),
                    x = e.clientX - rect.left,
                    y = e.clientY - rect.top;

                card.style.setProperty("--mouse-x", `${x}px`);
                card.style.setProperty("--mouse-y", `${y}px`);
            };
        }
    </script>
</body>
